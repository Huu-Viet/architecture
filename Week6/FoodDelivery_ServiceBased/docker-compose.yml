services:
  auth-db:
    image: postgres:15-alpine
    container_name: fd-auth-db
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_pass
    ports:
      - "54331:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - auth_db_data:/var/lib/postgresql/data

  restaurant-db:
    image: postgres:15-alpine
    container_name: fd-restaurant-db
    environment:
      POSTGRES_DB: restaurant_db
      POSTGRES_USER: restaurant_user
      POSTGRES_PASSWORD: restaurant_pass
    ports:
      - "54332:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U restaurant_user -d restaurant_db"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - restaurant_db_data:/var/lib/postgresql/data

  order-db:
    image: postgres:15-alpine
    container_name: fd-order-db
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: order_user
      POSTGRES_PASSWORD: order_pass
    ports:
      - "54333:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U order_user -d order_db"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - order_db_data:/var/lib/postgresql/data

  api-gateway:
    build: ./services/api-gateway
    container_name: fd-api-gateway
    environment:
      PORT: 3000
      AUTH_SERVICE_URL: http://auth-service:3001
      RESTAURANT_SERVICE_URL: http://restaurant-service:3002
      ORDER_SERVICE_URL: http://order-service:3003
    ports:
      - "4000:3000"
    depends_on:
      - auth-service
      - restaurant-service
      - order-service

  auth-service:
    build: ./services/auth-service
    container_name: fd-auth-service
    environment:
      PORT: 3001
      DB_HOST: auth-db
      DB_PORT: 5432
      DB_NAME: auth_db
      DB_USER: auth_user
      DB_PASSWORD: auth_pass
    depends_on:
      auth-db:
        condition: service_healthy
    ports:
      - "4001:3001"

  restaurant-service:
    build: ./services/restaurant-service
    container_name: fd-restaurant-service
    environment:
      PORT: 3002
      DB_HOST: restaurant-db
      DB_PORT: 5432
      DB_NAME: restaurant_db
      DB_USER: restaurant_user
      DB_PASSWORD: restaurant_pass
    depends_on:
      restaurant-db:
        condition: service_healthy
    ports:
      - "4002:3002"

  order-service:
    build: ./services/order-service
    container_name: fd-order-service
    environment:
      PORT: 3003
      RESTAURANT_SERVICE_URL: http://restaurant-service:3002
      DB_HOST: order-db
      DB_PORT: 5432
      DB_NAME: order_db
      DB_USER: order_user
      DB_PASSWORD: order_pass
    depends_on:
      order-db:
        condition: service_healthy
      restaurant-service:
        condition: service_started
    ports:
      - "4003:3003"

volumes:
  auth_db_data:
  restaurant_db_data:
  order_db_data:
